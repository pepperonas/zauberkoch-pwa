# zauberkoch.de — install to /etc/nginx/sites-available/zauberkoch.de + symlink.
# certbot --nginx -d zauberkoch.de -d www.zauberkoch.de adds the TLS blocks.

server {
    listen 80;
    listen [::]:80;
    server_name zauberkoch.de www.zauberkoch.de;

    # www -> apex (certbot rewrites HTTP->HTTPS on top of this)
    if ($host = www.zauberkoch.de) {
        return 301 https://zauberkoch.de$request_uri;
    }

    root /var/www/zauberkoch.de;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://*.googleusercontent.com; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self'; base-uri 'self'; form-action 'self' https://accounts.google.com" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # SSE generation endpoint — no buffering, long timeouts
    location /api/v1/recipes/generate {
        proxy_pass http://127.0.0.1:8742;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8742;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Shared-recipe pages: backend injects OG meta tags into the SPA shell
    location /r/ {
        proxy_pass http://127.0.0.1:8742;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # The SPA shell must never be HTTP-cached: without this, browsers apply
    # heuristic caching (Last-Modified) and reloads keep serving a stale
    # index.html with old chunk references, even through the service worker.
    # (try_files falls back here via internal redirect — the header must live
    # in THIS location, server-level add_header is dropped on redirects.)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Dynamic sitemap (public gallery recipes) — served by the API
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8742;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed assets: cache hard
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service worker must revalidate
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
